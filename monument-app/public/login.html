<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monument Gids | Inloggen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-body home-page login-page">
  <main class="login-shell">
    <header class="login-header">
      <a class="home-logo" href="/">
        <span class="home-logo-mark">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4.75 10.5 12 4.75l7.25 5.75v8.75a1 1 0 0 1-1 1h-3.5v-5.25h-5.5V20h-3.5a1 1 0 0 1-1-1Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"/>
          </svg>
        </span>
        <span>Monument Gids</span>
      </a>
    </header>

    <section class="login-stage" aria-labelledby="login-title">
      <div class="login-card">
        <div class="login-form-panel">
          <p class="login-kicker">Welkom terug</p>
          <h1 id="login-title">Log in en pak je monumentdossier weer op.</h1>

          <form class="login-form" id="login-form">
            <div class="login-field">
              <label for="email">E-mailadres</label>
              <input id="email" name="email" type="email" autocomplete="email" placeholder="naam@voorbeeld.nl" required />
            </div>

            <div class="login-field">
              <div class="login-field-head">
                <label for="password">Wachtwoord</label>
                <button class="login-inline-link" id="forgot-password" type="button">Wachtwoord vergeten?</button>
              </div>
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Voer je wachtwoord in" required />
            </div>

            <button class="button button-primary login-submit" type="submit">Inloggen</button>

            <p class="login-meta">
              Nog geen actief account? Gebruik deze pagina voorlopig als rustige opstap naar je intakeomgeving.
            </p>
            <p class="login-helper" id="forgot-password-message" hidden>
              Deze demo heeft nog geen wachtwoordherstel. Je kunt wel direct verder naar de intakeomgeving.
            </p>
          </form>
        </div>

        <aside class="login-media-panel" aria-label="Placeholder">
          <div class="login-placeholder" aria-hidden="true">
            <span class="login-placeholder-cross"></span>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="/login.js" type="module"></script>
</body>
</html>
